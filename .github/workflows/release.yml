name: Release

on:
  push:
    tags:
      - "v*"
      - "!v*-rc.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Stable tag to dry-run, for example v0.0.1
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TARGET_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate dispatch tag format
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          case "$TARGET_TAG" in
            v*-rc.*)
              echo "Stable release dry-run expects a non-RC tag" >&2
              exit 1
              ;;
            v*) ;;
            *)
              echo "workflow_dispatch tag must match vX.Y.Z" >&2
              exit 1
              ;;
          esac

      - uses: ./.github/actions/release-bundle
        with:
          release_tag: ${{ env.TARGET_TAG }}

      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle-${{ env.TARGET_TAG }}
          path: |
            dist/*.tar.gz
            dist/*.whl
          if-no-files-found: error

  publish_release:
    if: ${{ github.event_name == 'push' }}
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v8
        with:
          name: release-bundle-${{ github.ref_name }}
          path: release-bundle

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release-bundle/*.tar.gz
            release-bundle/*.whl
          fail_on_unmatched_files: true

  sync_stable:
    if: ${{ github.event_name == 'push' }}
    needs: publish_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Sync stable branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python scripts/release_assets.py sync-stable-ref --tag "${{ github.ref_name }}"
