name: CI

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
  workflow_dispatch:

jobs:
  release-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Sync Python environment
        run: uv sync --dev

      - name: Validate release contract
        run: |
          uv run python scripts/release_assets.py validate-config
          uv run python scripts/release_assets.py validate-docs

  example-validation:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')) }}
    needs: release-contract
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: go.server
            go: true
            go_enum: true
          - target: go.client
            go: true
          - target: typescript.client
            node: true
            typescript: true
          - target: python.http
          - target: kotlin.http
            java: true
          - target: java.http
            java: true
          - target: flutter.client
            dart: true
          - target: swift.client
          - target: wails.blueprint
            go: true
            node: true
            typescript: true
            wails: true
            go_enum: true
          - target: grpc
            go: true
            grpc: true
          - target: wails.hello
            go: true
            node: true
            typescript: true
            wails: true
            go_enum: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v8.1.0

      - uses: ./.github/actions/setup-example-toolchains
        with:
          java: ${{ matrix.java || false }}
          go: ${{ matrix.go || false }}
          node: ${{ matrix.node || false }}
          dart: ${{ matrix.dart || false }}
          typescript: ${{ matrix.typescript || false }}
          wails: ${{ matrix.wails || false }}
          go_enum: ${{ matrix.go_enum || false }}
          grpc: ${{ matrix.grpc || false }}

      - name: Sync Python environment
        run: uv sync --dev

      - name: Validate regenerated examples
        run: uv run python scripts/example_validation.py --target "${{ matrix.target }}"

  python-tests:
    needs:
      - release-contract
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Sync Python environment
        run: uv sync --dev

      - name: Run test suite
        run: uv run pytest -q -m "not example_validation"

      - name: Build package
        run: uv build --sdist --wheel
