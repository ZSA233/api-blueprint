name: CI

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
  workflow_dispatch:

jobs:
  release-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Sync Python environment
        run: uv sync --dev

      - name: Validate release contract
        run: |
          uv run python scripts/release_assets.py validate-config
          uv run python scripts/release_assets.py validate-docs

  example-validation:
    needs: release-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Install TypeScript toolchain
        run: npm install --global typescript

      - name: Install gRPC toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          curl -fsSL -o /tmp/protoc-32.0-linux-x86_64.zip \
            https://github.com/protocolbuffers/protobuf/releases/download/v32.0/protoc-32.0-linux-x86_64.zip
          unzip -o /tmp/protoc-32.0-linux-x86_64.zip -d "$HOME/.local"
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Sync Python environment
        run: uv sync --dev

      - name: Validate regenerated examples
        run: uv run python scripts/example_validation.py

  python-tests:
    needs:
      - release-contract
      - example-validation
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Sync Python environment
        run: uv sync --dev

      - name: Run test suite
        run: uv run pytest -q -m "not example_validation"

      - name: Build package
        run: uv build --sdist --wheel
