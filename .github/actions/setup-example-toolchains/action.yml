name: Setup Example Toolchains
description: Install the shared Go, Java, Dart, Node, TypeScript, Wails, and proto toolchains used by example validation

inputs:
  java:
    description: Install Java.
    default: "false"
  go:
    description: Install Go.
    default: "false"
  node:
    description: Install Node.js.
    default: "false"
  dart:
    description: Install Dart.
    default: "false"
  typescript:
    description: Install the TypeScript CLI.
    default: "false"
  wails:
    description: Install Wails Linux dependencies and CLIs.
    default: "false"
  go_enum:
    description: Install go-enum.
    default: "false"
  grpc:
    description: Install protoc and Go gRPC generator tools.
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-java@v5
      if: ${{ inputs.java == 'true' }}
      with:
        distribution: temurin
        java-version: "17"

    - uses: actions/setup-go@v6
      if: ${{ inputs.go == 'true' || inputs.wails == 'true' || inputs.go_enum == 'true' || inputs.grpc == 'true' }}
      with:
        go-version: "1.25"
        cache-dependency-path: |
          examples/golang/server/go.sum
          examples/golang/client/go.sum
          examples/grpc/go/go.sum
          examples/wails-harness/v2/go.sum
          examples/wails-harness/v3/go.sum
          examples/wails-hello/golang/go.sum
          examples/wails-hello/app/go.sum

    - uses: actions/setup-node@v6
      if: ${{ inputs.node == 'true' || inputs.typescript == 'true' || inputs.wails == 'true' }}
      with:
        node-version: "24"

    - uses: dart-lang/setup-dart@v1
      if: ${{ inputs.dart == 'true' }}

    - name: Install Wails Linux dependencies
      if: ${{ inputs.wails == 'true' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libayatana-appindicator3-dev \
          libgtk-3-dev \
          pkg-config
        webkit_packages=()
        for package in libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev; do
          if apt-cache show "$package" >/dev/null 2>&1; then
            webkit_packages+=("$package")
          fi
        done
        if [ "${#webkit_packages[@]}" -eq 0 ]; then
          echo "No supported WebKitGTK development package found." >&2
          exit 1
        fi
        sudo apt-get install -y "${webkit_packages[@]}"

    - name: Install TypeScript toolchain
      if: ${{ inputs.typescript == 'true' || inputs.wails == 'true' }}
      shell: bash
      run: npm install --global typescript

    - name: Install Wails CLIs
      if: ${{ inputs.wails == 'true' }}
      shell: bash
      run: |
        go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
        go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.83
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

    - name: Install go-enum
      if: ${{ inputs.go_enum == 'true' }}
      shell: bash
      run: |
        go install github.com/abice/go-enum@v0.9.2
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

    - name: Install gRPC generator toolchains
      if: ${{ inputs.grpc == 'true' }}
      shell: bash
      run: |
        curl -fsSL -o /tmp/protoc-32.0-linux-x86_64.zip \
          https://github.com/protocolbuffers/protobuf/releases/download/v32.0/protoc-32.0-linux-x86_64.zip
        unzip -o /tmp/protoc-32.0-linux-x86_64.zip -d "$HOME/.local"
        go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.0
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
