name: Setup Example Toolchains
description: Install the shared Go, Node, TypeScript, and gRPC toolchains used by example validation

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version: "1.24"
        cache-dependency-path: |
          examples/golang/go.sum
          examples/grpc/go/go.sum

    - uses: actions/setup-node@v6
      with:
        node-version: "24"

    - name: Install TypeScript toolchain
      shell: bash
      run: npm install --global typescript

    - name: Install gRPC toolchains
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler
        curl -fsSL -o /tmp/protoc-32.0-linux-x86_64.zip \
          https://github.com/protocolbuffers/protobuf/releases/download/v32.0/protoc-32.0-linux-x86_64.zip
        unzip -o /tmp/protoc-32.0-linux-x86_64.zip -d "$HOME/.local"
        go install github.com/abice/go-enum@v0.9.2
        go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.0
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
