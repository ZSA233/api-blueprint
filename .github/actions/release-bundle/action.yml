name: Build Release Bundle
description: Run shared release validation, build, and install-check steps

inputs:
  release_tag:
    description: Release tag matching the current checkout version metadata
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - uses: astral-sh/setup-uv@v8.1.0

    - name: Sync development environment
      shell: bash
      run: make sync

    - name: Preflight release checks
      shell: bash
      run: make release-preflight RELEASE_TAG="${{ inputs.release_tag }}"

    - name: Build release artifacts
      shell: bash
      run: make release-local RELEASE_TAG="${{ inputs.release_tag }}"

    - name: Verify installability
      shell: bash
      run: make release-install-check RELEASE_TAG="${{ inputs.release_tag }}"
