# Blueprint docs / entrypoints example
[blueprint]
docs_server = '0.0.0.0:2332'
docs_domain = ''
entrypoints = [
    'blueprints.app:*',
]

# Unified targets example. Shortcut target tables are normalized into canonical targets.
[[contract]]
id = 'contract'
out_dir = '.'

[[go.server]]
id = 'go.server'
out_dir = 'golang/server/views'
module = 'example.com/project/golang/server'

[[go.client]]
id = 'go.client'
out_dir = 'golang/client'
module = 'example.com/project/golang/client'
base_url = 'http://localhost:2333'

[[typescript.client]]
id = 'typescript.client'
out_dir = 'typescript'
base_url = 'http://localhost:2333'

[[kotlin.client]]
id = 'kotlin.client'
out_dir = 'kotlin'
module = 'com.example.apiblueprint'
base_url = 'http://localhost:2333'
include = ['tag:api']
exclude = [
    'path:/static/**',
    'path:/api/ws',
    'path:/api/demo/ws',
    'path:/api/demo/sweep-events',
    'path:/api/demo/assistant-session',
    'path:/api/demo/delete$',
]

[[java.server]]
id = 'java.server'
out_dir = 'java/server'
module = 'com.example.apiblueprint'

[[java.client]]
id = 'java.client'
out_dir = 'java/client'
module = 'com.example.apiblueprint'
base_url = 'http://localhost:2333'

[[python.server]]
id = 'python.server'
out_dir = 'python/server'
module = 'api_blueprint_example_server'
exclude = ['path:/api/binary/**']

[[python.client]]
id = 'python.client'
out_dir = 'python/client'
module = 'api_blueprint_example_client'
base_url = 'http://localhost:2333'

[[transport.http]]
id = 'http'
server = 'go.server'
clients = ['go.client', 'typescript.client', 'kotlin.client']

[[transport.http]]
id = 'http.python'
server = 'python.server'
clients = ['python.client']

[[transport.http]]
id = 'http.java'
server = 'java.server'
clients = ['java.client']

[[transport.wails]]
id = 'wails.v3'
version = 'v3'
server = 'go.server'
clients = ['typescript.client']
frontend_mode = 'external'
exclude = ['path:/api/binary/**']

[[transport.wails]]
id = 'wails.v2'
version = 'v2'
server = 'go.server'
clients = ['typescript.client']
frontend_mode = 'external'
exclude = ['path:/api/binary/**']



[[grpc.proto]]
id = 'grpc.proto'
out_dir = 'grpc/protos'
package = 'example.api'
go_package_prefix = 'example.com/project/grpc/go'
exclude = ['path:/api/binary/**']

[[grpc.proto.proto_files]]
file = 'api/api.proto'
package = 'example.api.api'
go_package = 'example.com/project/grpc/go/api/api;api'
route_paths = ['/api/ws']
service = 'ApiService'

[[grpc.proto.proto_files]]
file = 'api/demo.proto'
package = 'example.api.demo'
go_package = 'example.com/project/grpc/go/api/demo;demo'
route_paths = ['/api/demo/**']
service = 'DemoService'

[[grpc.proto.proto_files]]
file = 'api/hello.proto'
package = 'example.api.hello'
go_package = 'example.com/project/grpc/go/api/hello;hello'
route_paths = ['/api/hello/**']
service = 'HelloService'

[[grpc.proto.proto_files]]
file = 'static/static.proto'
package = 'example.api.static.static'
go_package = 'example.com/project/grpc/go/static/static;static'
route_paths = ['/static/**']
service = 'StaticService'

[[grpc.go]]
id = 'grpc.go'
proto = 'grpc.proto'
out_dir = 'grpc/go'
module = 'example.com/project/grpc/go'
exclude = ['path:/api/binary/**']
files = [
    'api/*.proto',
    'static/*.proto',
]

[[grpc.python]]
id = 'grpc.python'
proto = 'grpc.proto'
out_dir = 'grpc/python'
exclude = ['path:/api/binary/**']
files = [
    'api/*.proto',
    'static/*.proto',
]
module = 'pb'
