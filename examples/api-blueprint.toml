# Blueprint docs / entrypoints example
[blueprint]
docs_server = '0.0.0.0:2332'
docs_domain = ''
entrypoints = [
    'blueprints.app:*',
]

# 1.0 unified targets example
[[targets]]
id = 'contract'
kind = 'contract'
out_dir = '.'
formats = ['json', 'markdown', 'agent-json', 'agent-markdown', 'shards']

[[targets]]
id = 'go.server'
kind = 'go-server'
out_dir = 'golang'
module = ''

[[targets]]
id = 'typescript.client'
kind = 'typescript-client'
out_dir = 'typescript'
base_url = 'http://localhost:2333'

[[targets]]
id = 'kotlin.client'
kind = 'kotlin-client'
out_dir = 'kotlin'
package = 'com.example.apiblueprint'
base_url = 'http://localhost:2333'
include = ['tag:api']
exclude = [
    'path:/static/**',
    'path:/api/ws',
    'path:/api/demo/ws',
    'path:/api/demo/sweep-events',
    'path:/api/demo/assistant-session',
    'path:/api/demo/delete$',
]

[[targets]]
id = 'http'
kind = 'http-transport'
server = 'go.server'
clients = ['typescript.client', 'kotlin.client']

[[targets]]
id = 'wails.v3'
kind = 'wails-transport'
version = 'v3'
server = 'go.server'
clients = ['typescript.client']
frontend_mode = 'external'

[[targets]]
id = 'wails.v2'
kind = 'wails-transport'
version = 'v2'
server = 'go.server'
clients = ['typescript.client']
frontend_mode = 'external'

[[targets]]
id = 'grpc.proto'
kind = 'grpc-proto'
out_dir = 'grpc/protos'
package = 'example.api'
go_package_prefix = 'example.com/project/grpc/go'

[[targets.proto_files]]
file = 'api/api.proto'
package = 'example.api.api'
go_package = 'example.com/project/grpc/go/api/api;api'
route_paths = ['/api/ws']
service = 'ApiService'

[[targets.proto_files]]
file = 'api/demo.proto'
package = 'example.api.demo'
go_package = 'example.com/project/grpc/go/api/demo;demo'
route_paths = ['/api/demo/**']
service = 'DemoService'

[[targets.proto_files]]
file = 'api/hello.proto'
package = 'example.api.hello'
go_package = 'example.com/project/grpc/go/api/hello;hello'
route_paths = ['/api/hello/**']
service = 'HelloService'

[[targets.proto_files]]
file = 'static/static.proto'
package = 'example.api.static.static'
go_package = 'example.com/project/grpc/go/static/static;static'
route_paths = ['/static/**']
service = 'StaticService'

[[targets]]
id = 'grpc.go'
kind = 'grpc-go'
proto = 'grpc.proto'
out_dir = 'grpc/go'
module = 'example.com/project/grpc/go'
files = [
    'api/*.proto',
    'static/*.proto',
]

[[targets]]
id = 'grpc.python'
kind = 'grpc-python'
proto = 'grpc.proto'
out_dir = 'grpc/python'
files = [
    'api/*.proto',
    'static/*.proto',
]
python_package_root = 'pb'
