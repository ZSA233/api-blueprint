# Blueprint docs / entrypoints example
[blueprint]
docs_server = '0.0.0.0:2332'
docs_domain = ''
entrypoints = [
    'blueprints.app:*',
]

# Blueprint -> Go snapshot example
[golang]
codegen_output = 'golang'
upstream = 'http://localhost:2333'
module = ''

# Blueprint -> TypeScript snapshot example
[typescript]
codegen_output = 'typescript'
upstream = 'http://localhost:2333'
base_url = 'http://localhost:2333'

# Existing proto tree -> gRPC snapshots example
[grpc]
source_root = 'grpc/protos'
import_roots = []

[[grpc.targets]]
id = 'python.greeter'
lang = 'python'
out_dir = 'grpc/python'
files = ['**/*.proto']

[[grpc.targets]]
id = 'go.greeter'
lang = 'go'
out_dir = 'grpc/go'
files = [
    'commonpb/common.proto',
    'greeterpb/greeter.proto',
]
