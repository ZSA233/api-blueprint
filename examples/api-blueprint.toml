# Blueprint docs / entrypoints example
[blueprint]
docs_server = '0.0.0.0:2332'
docs_domain = ''
entrypoints = [
    'blueprints.app:*',
]

# Blueprint -> Go snapshot example
[golang]
codegen_output = 'golang'
upstream = 'http://localhost:2333'
module = ''

# Blueprint -> TypeScript snapshot example
[typescript]
codegen_output = 'typescript'
upstream = 'http://localhost:2333'
base_url = 'http://localhost:2333'

# Blueprint -> Kotlin Android client snapshot example
[kotlin]
codegen_output = 'kotlin'
package = 'com.example.apiblueprint'
base_url = 'http://localhost:2333'
include = ['tag:api']
exclude = ['path:/static/**', 'path:/api/ws', 'path:/api/demo/ws', 'path:/api/demo/delete$']

# Blueprint -> Wails snapshot examples
[[wails.targets]]
id = 'wails.v3'
version = 'v3'
go_out_dir = 'wails/v3/go'
typescript_out_dir = 'wails/v3/typescript'

[[wails.targets]]
id = 'wails.v2'
version = 'v2'
go_out_dir = 'wails/v2/go'
typescript_out_dir = 'wails/v2/typescript'

# Existing proto tree -> gRPC snapshots example
[grpc]
source_root = 'grpc/protos'
import_roots = []

[[grpc.targets]]
id = 'python.greeter'
lang = 'python'
out_dir = 'grpc/python'
files = ['**/*.proto']
python_package_root = 'examplegrpc_pb'

[[grpc.targets]]
id = 'go.greeter'
lang = 'go'
out_dir = 'grpc/go'
files = [
    'commonpb/common.proto',
    'greeterpb/greeter.proto',
]
